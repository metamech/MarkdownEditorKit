name: Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (Swift 6.2)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install tooling
        run: |
          set -euo pipefail
          brew install swift-format swiftlint markdownlint-cli2 typos-cli

      - name: Validate package manifest
        run: swift package describe

      - name: swift-format lint
        run: swift-format lint --recursive --strict Sources

      - name: SwiftLint
        run: swiftlint --strict

      - name: markdownlint
        run: markdownlint-cli2 "**/*.md"

      - name: typos
        run: typos
